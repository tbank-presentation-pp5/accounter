services:
  cloudflare:
    build: .
    container_name: accounter
    ports:
      - "8001:8001"
    environment:
      - TZ=UTC
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s